<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MockAdda – Free Online Mock Tests for Students & Teachers</title>
<meta name="description" content="Practice free mock tests on MockAdda. Best CBT simulator for GK, Math, Science and English. Perfect for students preparing for competitive exams." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070c18; --surface:#0d1426; --card:#121c33; --cardHov:#192237;
    --border:rgba(255,255,255,0.07); --primary:#f59e0b; --primaryBg:rgba(245,158,11,0.12);
    --indigo:#818cf8; --indigoBg:rgba(129,140,248,0.12);
    --green:#34d399; --greenBg:rgba(52,211,153,0.12);
    --red:#f87171; --redBg:rgba(248,113,113,0.12);
    --purple:#a78bfa; --purpleBg:rgba(167,139,250,0.12);
    --text:#f1f5f9; --muted:#94a3b8; --dim:#475569;
    --ff:'DM Sans',sans-serif; --ffh:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);color:var(--text);font-family:var(--ff);}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-thumb{background:var(--primaryBg);border-radius:4px;}
  button{font-family:var(--ff);}
  #app{min-height:100vh;}
  .hdr{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .hdr button.back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;padding:0;line-height:1;}
  .hdr-title{font-family:var(--ffh);font-weight:700;font-size:17px;color:var(--text);}
  .hdr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes blink{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
</style>
</head>
<body>
<!-- SEO fallback content -->
<div id="app">
  <header style="text-align:center;padding:40px 20px;">
    <h1 style="font-size:2rem;color:#f59e0b;">MockAdda</h1>
    <p style="color:#94a3b8;margin-top:8px;">Free Online Mock Tests for Students &amp; Teachers</p>
  </header>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>
</body>
</html>
